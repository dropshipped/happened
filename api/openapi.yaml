components:
  schemas:
    CreateUploadURLBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/CreateUploadURLBody.json
          format: uri
          readOnly: true
          type: string
        method:
          type: string
        signed_headers:
          additionalProperties:
            type: string
          type: object
        upload_url:
          type: string
      required:
        - method
        - upload_url
        - signed_headers
      type: object
    CreateUploadURLRequestBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/CreateUploadURLRequestBody.json
          format: uri
          readOnly: true
          type: string
        image_key:
          examples:
            - my-image.jpeg
          type: string
      required:
        - image_key
      type: object
    ErrorDetail:
      additionalProperties: false
      properties:
        location:
          description: Where the error occurred, e.g. 'body.items[3].tags' or 'path.thing-id'
          type: string
        message:
          description: Error message text
          type: string
        value:
          description: The value at the given location
      type: object
    ErrorModel:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/ErrorModel.json
          format: uri
          readOnly: true
          type: string
        detail:
          description: A human-readable explanation specific to this occurrence of the problem.
          examples:
            - Property foo is required but is missing.
          type: string
        errors:
          description: Optional list of individual error details
          items:
            $ref: "#/components/schemas/ErrorDetail"
          type:
            - array
            - "null"
        instance:
          description: A URI reference that identifies the specific occurrence of the problem.
          examples:
            - https://example.com/error-log/abc123
          format: uri
          type: string
        status:
          description: HTTP status code
          examples:
            - 400
          format: int64
          type: integer
        title:
          description: A short, human-readable summary of the problem type. This value should not change between occurrences of the error.
          examples:
            - Bad Request
          type: string
        type:
          default: about:blank
          description: A URI reference to human-readable documentation for the error.
          examples:
            - https://example.com/errors/example
          format: uri
          type: string
      type: object
    GreetingOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/GreetingOutputBody.json
          format: uri
          readOnly: true
          type: string
        message:
          description: Greeting message
          examples:
            - Hello, world!
          type: string
      required:
        - message
      type: object
info:
  title: Happened API
  version: 1.0.0
openapi: 3.1.0
paths:
  /create-upload-url:
    get:
      operationId: get-create-upload-url
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUploadURLRequestBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateUploadURLBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Get create upload URL
  /greeting/protected/{name}:
    get:
      description: Protected version of greet
      operationId: protected-greet
      parameters:
        - description: Name to greet
          example: world
          in: path
          name: name
          required: true
          schema:
            description: Name to greet
            examples:
              - world
            maxLength: 30
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GreetingOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - BearerAuth: []
      summary: Get a protected greeting
      tags:
        - Greetings
  /greeting/public/{name}:
    get:
      description: Get a greeting for a person by name.
      operationId: get-greeting
      parameters:
        - description: Name to greet
          example: world
          in: path
          name: name
          required: true
          schema:
            description: Name to greet
            examples:
              - world
            maxLength: 30
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GreetingOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Get a greeting
      tags:
        - Greetings

